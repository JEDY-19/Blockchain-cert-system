<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal — Certificates</title>
<style>
:root { --primary:#1a1a6e; --gray-100:#f3f4f6; --gray-600:#4b5563; --gray-800:#1f2937; --success:#16a34a; --danger:#dc2626; --r:10px; }
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:var(--gray-100);color:var(--gray-800);padding:24px;line-height:1.5;}
.wrap{max-width:720px;margin:0 auto;}
h1{font-size:1.35rem;color:var(--primary);margin-bottom:4px;}
.sub{color:var(--gray-600);font-size:.88rem;margin-bottom:22px;}
.card{background:#fff;border-radius:var(--r);padding:22px;margin-bottom:18px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.tabs{display:flex;gap:8px;margin-bottom:16px;}
.tab{padding:8px 16px;border-radius:var(--r);border:none;background:#e5e7eb;cursor:pointer;font-size:.88rem;}
.tab.active{background:var(--primary);color:#fff;}
.panel{display:none;}
.panel.active{display:block;}
.form-group{margin-bottom:14px;}
label{display:block;font-size:.82rem;font-weight:600;margin-bottom:4px;}
input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:.92rem;}
.btn{background:var(--primary);color:#fff;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:500;width:100%;}
.btn-ghost{background:#e5e7eb;color:var(--gray-800);}
.alert{padding:12px;border-radius:8px;margin-bottom:14px;font-size:.86rem;}
.alert-danger{background:#fee2e2;color:#991b1b;}
.alert-success{background:#dcfce7;color:#14532d;}
table{width:100%;border-collapse:collapse;font-size:.84rem;}
th,td{padding:10px;text-align:left;border-bottom:1px solid #eee;}
th{font-size:.75rem;text-transform:uppercase;color:var(--gray-600);}
.badge{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;}
.badge-success{background:#dcfce7;color:var(--success);}
.badge-warn{background:#fef3c7;color:#b45309;}
.badge-danger{background:#fee2e2;color:var(--danger);}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
a{color:var(--primary);}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>Student portal</h1>
      <p class="sub">View certificates issued to your record.</p>
    </div>
    <a href="index.html">← Admin / home</a>
  </div>

  <div id="view-auth" class="card">
    <div class="tabs">
      <button type="button" class="tab active" data-tab="login">Sign in</button>
      <button type="button" class="tab" data-tab="register">Register</button>
    </div>
    <div id="msg"></div>

    <div id="panel-login" class="panel active">
      <div class="form-group">
        <label>Email (same as on file with the registry)</label>
        <input type="email" id="l-email" placeholder="student@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="••••••••">
      </div>
      <button type="button" class="btn" id="btn-login">Sign in</button>
    </div>

    <div id="panel-register" class="panel">
      <p class="sub" style="margin-bottom:12px;">Register only if you already exist in the university system (same matric and email as when your certificate was issued).</p>
      <div class="form-group">
        <label>Matric number</label>
        <input type="text" id="r-matric" placeholder="22CD009420">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="r-email" placeholder="student@email.com">
      </div>
      <div class="form-group">
        <label>Password (min 8 characters)</label>
        <input type="password" id="r-pass">
      </div>
      <button type="button" class="btn" id="btn-register">Create account</button>
    </div>
  </div>

  <div id="view-dash" class="card" style="display:none;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <strong id="stu-name"></strong>
        <div class="sub" id="stu-matric"></div>
      </div>
      <button type="button" class="btn btn-ghost" id="btn-logout" style="width:auto;">Sign out</button>
    </div>
    <h2 style="font-size:1rem;margin-bottom:10px;color:var(--primary);">Your certificates</h2>
    <div id="cert-list">Loading…</div>
  </div>
</div>

<script>
const API = 'backend/api';

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function showMsg(html, ok) {
  const el = document.getElementById('msg');
  el.className = 'alert ' + (ok ? 'alert-success' : 'alert-danger');
  el.innerHTML = html;
  el.style.display = 'block';
}

document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
    document.getElementById('msg').style.display = 'none';
  });
});

document.getElementById('btn-login').onclick = async () => {
  const email = document.getElementById('l-email').value.trim();
  const password = document.getElementById('l-pass').value;
  try {
    const res = await fetch(API + '/student_login.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ email, password }),
    });
    const d = await res.json();
    if (d.success) showDashboard(d.name, d.matric);
    else showMsg(d.message || 'Login failed', false);
  } catch (e) { showMsg('Server error: ' + e.message, false); }
};

document.getElementById('btn-register').onclick = async () => {
  const matric_number = document.getElementById('r-matric').value.trim();
  const email = document.getElementById('r-email').value.trim();
  const password = document.getElementById('r-pass').value;
  try {
    const res = await fetch(API + '/student_register.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      credentials: 'same-origin',
      body: JSON.stringify({ matric_number, email, password }),
    });
    const d = await res.json();
    if (d.success) showMsg('Account created. Switch to Sign in.', true);
    else showMsg(d.message || 'Registration failed', false);
  } catch (e) { showMsg('Server error: ' + e.message, false); }
};

document.getElementById('btn-logout').onclick = async () => {
  await fetch(API + '/student_logout.php', { method: 'POST', credentials: 'same-origin' });
  document.getElementById('view-dash').style.display = 'none';
  document.getElementById('view-auth').style.display = 'block';
};

async function showDashboard(name, matric) {
  document.getElementById('view-auth').style.display = 'none';
  document.getElementById('view-dash').style.display = 'block';
  document.getElementById('stu-name').textContent = name;
  document.getElementById('stu-matric').textContent = matric;
  const box = document.getElementById('cert-list');
  box.textContent = 'Loading…';
  try {
    const res = await fetch(API + '/student_certificates.php', { credentials: 'same-origin' });
    const d = await res.json();
    if (!d.success) {
      box.innerHTML = '<p class="sub">Could not load certificates.</p>';
      return;
    }
    if (!d.data.length) {
      box.innerHTML = '<p class="sub">No certificates linked to your account yet.</p>';
      return;
    }
    box.innerHTML = `<table><thead><tr><th>ID</th><th>Status</th><th>Issued</th><th></th></tr></thead><tbody>${
      d.data.map(c => {
        const st = c.status === 'issued' ? 'success' : c.status === 'revoked' ? 'danger' : 'warn';
        const verifyUrl = 'index.html?verify=' + encodeURIComponent(c.certificate_id);
        const cid = escapeHtml(c.certificate_id);
        const cst = escapeHtml(c.status);
        const issued = escapeHtml(new Date(c.issued_at).toLocaleDateString());
        return `<tr><td><code style="font-size:11px;">${cid}</code></td><td><span class="badge badge-${st}">${cst}</span></td><td>${issued}</td><td><a href="${verifyUrl}">Verify</a></td></tr>`;
      }).join('')
    }</tbody></table>`;
  } catch (e) {
    box.textContent = 'Error loading list.';
  }
}

(async function resumeSession() {
  try {
    const res = await fetch(API + '/student_me.php', { credentials: 'same-origin' });
    const d = await res.json();
    if (d.success && d.logged_in && d.name) showDashboard(d.name, d.matric || '');
  } catch (e) { /* ignore */ }
})();
</script>
</body>
</html>
